name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*' # Trigger on tags like v1.0.0

jobs:
  build-and-release:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required for creating GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app and (conditionally) create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # tauri-action will automatically detect if it's a tag push ('v*').
        # If it is a tag push, it creates a release and uploads artifacts.
        # If it's a normal push to master, it will only do the build.

      - name: Upload Artifacts to Action Logs (Always)
        uses: actions/upload-artifact@v4
        with:
          name: video_explorer-${{ matrix.name }}
          # Tauri bundles output to these standard paths based on OS and configurations.
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
